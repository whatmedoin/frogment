name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-release:
    name: Check release
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.metadata.outputs.project_name }}
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read package metadata
        id: metadata
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          manifest = tomllib.loads(Path("Cargo.toml").read_text())
          package = manifest["package"]
          version = package["version"]

          print(f"project_name={package['name']}")
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Check for existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          status="$(
            curl -sS -o /dev/null -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          )"

          case "$status" in
            200)
              echo "Release $TAG already exists. Skipping build and release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "Release $TAG does not exist. Building and publishing release assets."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unexpected GitHub API status $status while checking release $TAG."
              exit 1
              ;;
          esac

  build:
    name: Build ${{ matrix.asset_arch }}
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_arch: amd64
          - target: armv7-unknown-linux-gnueabihf
            asset_arch: armv7
          - target: aarch64-unknown-linux-gnu
            asset_arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare release asset
        env:
          PROJECT_NAME: ${{ needs.check-release.outputs.project_name }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          asset_name="${PROJECT_NAME}_linux_${ASSET_ARCH}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${PROJECT_NAME}" "dist/${asset_name}"
          chmod +x "dist/${asset_name}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check-release.outputs.project_name }}_linux_${{ matrix.asset_arch }}
          path: dist/${{ needs.check-release.outputs.project_name }}_linux_${{ matrix.asset_arch }}
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - check-release
      - build
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-release.outputs.tag }}
        run: gh release create "$TAG" dist/* --title "$TAG" --notes ""
