name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-release:
    name: Check release
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.metadata.outputs.project_name }}
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      release_exists: ${{ steps.release.outputs.release_exists }}
      force_release: ${{ steps.release.outputs.force_release }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read package metadata
        id: metadata
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          manifest = tomllib.loads(Path("Cargo.toml").read_text())
          package = manifest["package"]
          version = package["version"]

          print(f"project_name={package['name']}")
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Check for existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          FORCE_RELEASE: ${{ vars.FORCE_RELEASE }}
        run: |
          force_release="${FORCE_RELEASE:-0}"
          case "$force_release" in
            0)
              echo "force_release=false" >> "$GITHUB_OUTPUT"
              ;;
            1)
              echo "FORCE_RELEASE=1. Existing release assets will be overwritten after all builds succeed."
              echo "force_release=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "FORCE_RELEASE must be undefined, 0, or 1. Got: $force_release"
              exit 1
              ;;
          esac

          status="$(
            curl -sS -o /dev/null -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          )"

          case "$status" in
            200)
              echo "release_exists=true" >> "$GITHUB_OUTPUT"
              if [ "$force_release" = "1" ]; then
                echo "Release $TAG already exists. FORCE_RELEASE=1, so build will continue."
                echo "should_release=true" >> "$GITHUB_OUTPUT"
              else
                echo "Release $TAG already exists. Skipping build and release."
                echo "should_release=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            404)
              echo "release_exists=false" >> "$GITHUB_OUTPUT"
              echo "Release $TAG does not exist. Building and publishing release assets."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unexpected GitHub API status $status while checking release $TAG."
              exit 1
              ;;
          esac

  build:
    name: Build ${{ matrix.asset_arch }}
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_arch: amd64
          - target: armv7-unknown-linux-gnueabihf
            asset_arch: armv7
          - target: aarch64-unknown-linux-gnu
            asset_arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare release asset
        env:
          PROJECT_NAME: ${{ needs.check-release.outputs.project_name }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          asset_name="${PROJECT_NAME}_linux_${ASSET_ARCH}"
          package_dir="package/${asset_name}"
          mkdir -p dist
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/${PROJECT_NAME}" "${package_dir}/${asset_name}"
          cp example-config.yml "${package_dir}/example-config.yml"
          chmod +x "${package_dir}/${asset_name}"
          (cd "$package_dir" && zip -r "../../dist/${asset_name}.zip" .)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check-release.outputs.project_name }}_linux_${{ matrix.asset_arch }}.zip
          path: dist/${{ needs.check-release.outputs.project_name }}_linux_${{ matrix.asset_arch }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - check-release
      - build
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-release.outputs.tag }}
          RELEASE_EXISTS: ${{ needs.check-release.outputs.release_exists }}
          FORCE_RELEASE_ENABLED: ${{ needs.check-release.outputs.force_release }}
        run: |
          if [ "$RELEASE_EXISTS" = "true" ]; then
            if [ "$FORCE_RELEASE_ENABLED" != "true" ]; then
              echo "Refusing to overwrite release $TAG because FORCE_RELEASE is not 1."
              exit 1
            fi

            gh release upload "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes ""
          fi
